<!-- RPG Tracker Native SillyTavern Settings Template -->
<div class="rpg-tracker-settings">
    <div class="inline-drawer">
        <!-- 설정 메뉴 제목 표시 및 드로어 토글 토큰 -->
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>RPG Tracker</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        
        <!-- 설정 세부 내용 컨테이너 -->
        <div class="inline-drawer-content">
            <!-- 활성화/비활성화 토글 블록 -->
            <div class="rpg-tracker-settings_block flex-container" style="display: flex; align-items: center; gap: 8px;">
                <input id="rpg_tracker_enabled" type="checkbox" />
                <label for="rpg_tracker_enabled" style="cursor: pointer; user-select: none;">Enable RPG Tracker</label>
            </div>

            <!-- 하단 구분 선 -->
            <hr class="sysHR" />
        </div>
    </div>
</div>
